sonar.projectKey=nelson-lamounier_frontend-portfolio
sonar.organization=nelson-lamounier

# Project Metadata
sonar.projectName=Frontend Portfolio

# Source locations
sonar.sources=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**

# Exclusions
sonar.exclusions=node_modules/**,.next/**,jest.setup.ts,jest.config.ts

# Code Coverage Integration (reads lcov.info from Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,apps/start-admin/src/components/ui/**,packages/shared/src/components/ui/**,packages/ui/**

# Encoding
sonar.sourceEncoding=UTF-8
