sonar.projectKey=nelson-lamounier_frontend-portfolio
sonar.organization=nelson-lamounier

# Project Metadata
sonar.projectName=Frontend Portfolio

# Source locations
sonar.sources=apps/site/src,apps/site/mdx-components.tsx,apps/site/scripts
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**

# Exclusions
sonar.exclusions=node_modules/**,.next/**,apps/site/jest.setup.ts,apps/site/jest.config.ts

# Code Coverage Integration (reads lcov.info from Jest)
sonar.javascript.lcov.reportPaths=apps/site/coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,apps/site/src/components/ui/**

# Encoding
sonar.sourceEncoding=UTF-8
