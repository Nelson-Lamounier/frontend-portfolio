sonar.projectKey=nelson-lamounier_frontend-portfolio
sonar.organization=nelson-lamounier

# Project Metadata
sonar.projectName=Frontend Portfolio

# Source locations
sonar.sources=src
sonar.tests=__tests__

# Exclusions
sonar.exclusions=node_modules/**,.next/**,**/*.test.ts,**/*.test.tsx,jest.setup.ts,jest.config.ts

# Code Coverage Integration (reads lcov.info from Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,src/components/ui/**

# Encoding
sonar.sourceEncoding=UTF-8
