# .github/workflows/ci.yml
# CI pipeline for Next.js frontend application
# Runs linting, type checking, tests, and build verification

name: Continuous Integration

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  NODE_VERSION: '22' # Fallback - prefer .nvmrc

permissions:
  contents: read

jobs:
  # ============================================================================
  # Change Detection (Runs First - ~10 seconds)
  # ============================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      styles: ${{ steps.filter.outputs.styles }}
      config: ${{ steps.filter.outputs.config }}
      docker: ${{ steps.filter.outputs.docker }}
      start-admin: ${{ steps.filter.outputs.start-admin }}
      # Computed: should we run all checks?
      run-all: ${{ steps.compute.outputs.run-all }}
      # Computed: should we run site docker build test?
      run-docker: ${{ steps.compute.outputs.run-docker }}
      # Computed: should we run start-admin docker build?
      run-start-admin-docker: ${{ steps.compute.outputs.run-start-admin-docker }}
      # Computed: should we run start-admin checks?
      run-start-admin: ${{ steps.compute.outputs.run-start-admin }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Changed Paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'apps/site/src/**'
              - 'apps/site/public/**'
              - 'apps/site/mdx-components.tsx'
              - 'packages/shared/src/**'
            tests:
              - 'apps/site/__tests__/**'
              - 'apps/site/jest.config.*'
              - 'apps/site/jest.setup.*'
            styles:
              - 'apps/site/**/*.css'
              - 'apps/site/tailwind.config.*'
              - 'apps/site/postcss.config.*'
              - 'packages/shared/**/*.css'
            config:
              - '.github/**'
              - '.gitignore'
              - 'package.json'
              - 'yarn.lock'
              - 'apps/site/tsconfig*.json'
              - 'apps/site/next-env.d.ts'
              - 'apps/site/next.config.*'
              - 'apps/site/eslint.config.*'
              - 'apps/site/package.json'
            docker:
              - 'Dockerfile'
              - '.dockerignore'
            start-admin:
              - 'apps/start-admin/**'
              - 'packages/shared/**'
            start-admin-docker:
              - 'apps/start-admin/Dockerfile'
              - 'apps/start-admin/**'

      - name: Compute Run Flags
        id: compute
        run: |
          # Run all checks if config changed
          if [[ "${{ steps.filter.outputs.config }}" == "true" ]]; then
            echo "run-all=true" >> $GITHUB_OUTPUT
            echo "Config changed - will run all checks"
          else
            echo "run-all=false" >> $GITHUB_OUTPUT
          fi

          # Run docker build if dockerfile or source changed
          if [[ "${{ steps.filter.outputs.docker }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.src }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.config }}" == "true" ]]; then
            echo "run-docker=true" >> $GITHUB_OUTPUT
          else
            echo "run-docker=false" >> $GITHUB_OUTPUT
          fi

          # Run start-admin checks if start-admin or config changed
          if [[ "${{ steps.filter.outputs.start-admin }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.config }}" == "true" ]]; then
            echo "run-start-admin=true" >> $GITHUB_OUTPUT
          else
            echo "run-start-admin=false" >> $GITHUB_OUTPUT
          fi

          # Run start-admin docker build if its Dockerfile or source changed
          if [[ "${{ steps.filter.outputs.start-admin-docker }}" == "true" ]] || \
             [[ "${{ steps.filter.outputs.config }}" == "true" ]]; then
            echo "run-start-admin-docker=true" >> $GITHUB_OUTPUT
          else
            echo "run-start-admin-docker=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "## Change Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source | ${{ steps.filter.outputs.src }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.filter.outputs.tests }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Styles | ${{ steps.filter.outputs.styles }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Config | ${{ steps.filter.outputs.config }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker (Site) | ${{ steps.filter.outputs.docker }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Start Admin | ${{ steps.filter.outputs.start-admin }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Start Admin Docker | ${{ steps.filter.outputs.start-admin-docker }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run All Checks:** ${{ steps.compute.outputs.run-all }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run Site Docker Build:** ${{ steps.compute.outputs.run-docker }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run Start Admin:** ${{ steps.compute.outputs.run-start-admin }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run Start Admin Docker:** ${{ steps.compute.outputs.run-start-admin-docker }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Dependency Installation & Caching
  # ============================================================================
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      node-version: ${{ steps.nvmrc.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: |
          if [ -f .nvmrc ]; then
            VERSION=$(cat .nvmrc | tr -d '[:space:]')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Using Node.js version from .nvmrc: $VERSION"
          else
            echo "version=${{ env.NODE_VERSION }}" >> $GITHUB_OUTPUT
            echo "Using fallback Node.js version: ${{ env.NODE_VERSION }}"
          fi

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}

  # ============================================================================
  # Security Audit
  # ============================================================================
  audit:
    name: Security Audit
    needs: [setup, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      needs.detect-changes.outputs.config == 'true' ||
      needs.detect-changes.outputs.run-all == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Run Audit
        run: yarn npm audit --all --severity high

  # ============================================================================
  # Code Quality
  # ============================================================================
  lint:
    name: Lint Code
    needs: [setup, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.tests == 'true' ||
      needs.detect-changes.outputs.run-all == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Run ESLint
        run: yarn lint

  typecheck:
    name: Type Check
    needs: [setup, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.tests == 'true' ||
      needs.detect-changes.outputs.run-all == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Run TypeScript Compiler
        run: yarn workspace site exec tsc --noEmit

  # ============================================================================
  # Unit Tests
  # ============================================================================
  test:
    name: Unit Tests
    needs: [setup, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.tests == 'true' ||
      needs.detect-changes.outputs.run-all == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Run Tests
        run: yarn test --ci --coverage

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================================
  # Build Verification
  # ============================================================================
  build:
    name: Build Next.js
    needs: [setup, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.styles == 'true' ||
      needs.detect-changes.outputs.run-all == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Build Next.js Application
        run: yarn build
        env:
          # Suppress telemetry during CI builds
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Verify Build Output
        run: |
          if [ -d "apps/site/.next" ]; then
            echo "✓ Site build output directory exists"
            echo "Build size:"
            du -sh apps/site/.next
          else
            echo "✗ Site build output directory not found"
            exit 1
          fi

  # ============================================================================
  # Docker Build Test
  # ============================================================================
  docker-build:
    name: Docker Build Test
    needs: [setup, detect-changes, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      needs.detect-changes.outputs.run-docker == 'true' &&
      needs.build.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Test Only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: frontend:ci-test
          build-args: |
            APP_NAME=site
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke Test Container Endpoints
        run: |
          echo "Starting container for smoke tests..."
          docker run -d --name test-container -p 3000:3000 frontend:ci-test

          # Wait for Next.js server to be ready (poll for up to 30s)
          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 2 http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✓ Server is ready (attempt $i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "✗ Server failed to start within 30s"
              docker logs test-container
              exit 1
            fi
            sleep 1
          done

          # ── /api/health ──────────────────────────────────────────────
          echo ""
          echo "=== Testing /api/health ==="
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:3000/api/health)
          if [ "$HEALTH_STATUS" = "200" ]; then
            echo "✓ /api/health returned 200"
          else
            echo "✗ /api/health returned $HEALTH_STATUS (expected 200)"
            docker logs test-container
            exit 1
          fi

          # ── /api/metrics ─────────────────────────────────────────────
          # This is the critical test: if /api/metrics hangs (e.g. SSM
          # timeout), the 5-second --max-time will kill curl and fail CI.
          echo ""
          echo "=== Testing /api/metrics ==="
          METRICS_BODY=$(curl -sf --max-time 5 http://localhost:3000/api/metrics 2>&1) || {
            echo "✗ /api/metrics timed out or returned non-200"
            echo "  This likely means SSM or another blocking call has no timeout."
            echo "  Container logs:"
            docker logs test-container
            exit 1
          }
          echo "✓ /api/metrics responded within 5 seconds"

          # Verify response is valid Prometheus format
          if echo "$METRICS_BODY" | grep -q "^# HELP\|^# TYPE\|nextjs_"; then
            echo "✓ Response contains Prometheus metrics"
          else
            echo "✗ Response does not look like Prometheus metrics:"
            echo "$METRICS_BODY" | head -20
            exit 1
          fi

          echo ""
          echo "=== All smoke tests passed ==="

          # Cleanup
          docker stop test-container
          docker rm test-container

  # ============================================================================
  # Start-Admin — Lint
  # ============================================================================
  start-admin-lint:
    name: Start Admin Lint
    needs: [setup, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      needs.detect-changes.outputs.run-start-admin == 'true' ||
      needs.detect-changes.outputs.run-all == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Run ESLint (start-admin)
        run: yarn workspace start-admin lint

  # ============================================================================
  # Start-Admin — Type Check
  # ============================================================================
  start-admin-typecheck:
    name: Start Admin Type Check
    needs: [setup, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      needs.detect-changes.outputs.run-start-admin == 'true' ||
      needs.detect-changes.outputs.run-all == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Run TypeScript Compiler (start-admin)
        run: yarn workspace start-admin typecheck

  # ============================================================================
  # Start-Admin — Build
  # ============================================================================
  start-admin-build:
    name: Start Admin Build
    needs: [setup, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      needs.detect-changes.outputs.run-start-admin == 'true' ||
      needs.detect-changes.outputs.run-all == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Build TanStack Start Application
        run: yarn workspace start-admin build

      - name: Verify Build Output
        run: |
          if [ -d "apps/start-admin/dist" ] && [ -f "apps/start-admin/dist/server/server.js" ]; then
            echo "✓ Start Admin build output exists"
            du -sh apps/start-admin/dist
          else
            echo "✗ Start Admin build output not found (expected dist/server/server.js)"
            exit 1
          fi

  # ============================================================================
  # Start-Admin — Unit Tests
  # ============================================================================
  start-admin-test:
    name: Start Admin Tests
    needs: [setup, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      needs.detect-changes.outputs.run-start-admin == 'true' ||
      needs.detect-changes.outputs.run-all == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Run Tests (start-admin)
        run: yarn workspace start-admin test

  # ============================================================================
  # Start-Admin — Docker Build Test
  # ============================================================================
  start-admin-docker-build:
    name: Start Admin Docker Build
    needs: [setup, detect-changes, start-admin-build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      needs.detect-changes.outputs.run-start-admin-docker == 'true' &&
      needs.start-admin-build.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Test Only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/start-admin/Dockerfile
          push: false
          load: true
          tags: start-admin:ci-test
          cache-from: type=gha,scope=start-admin
          cache-to: type=gha,mode=max,scope=start-admin

      - name: Smoke Test Container
        run: |
          echo "Starting start-admin container for smoke tests..."
          docker run -d --name admin-test-container -p 5001:5001 start-admin:ci-test

          # Wait for server to be ready (poll for up to 30s)
          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 2 http://localhost:5001/admin/ > /dev/null 2>&1; then
              echo "✓ Server is ready (attempt $i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "✗ Server failed to start within 30s"
              docker logs admin-test-container
              exit 1
            fi
            sleep 1
          done

          ADMIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:5001/admin/)
          if [ "$ADMIN_STATUS" -lt "500" ]; then
            echo "✓ /admin/ returned $ADMIN_STATUS"
          else
            echo "✗ /admin/ returned $ADMIN_STATUS (expected < 500)"
            docker logs admin-test-container
            exit 1
          fi

          echo ""
          echo "=== Start Admin smoke tests passed ==="

          # Cleanup
          docker stop admin-test-container
          docker rm admin-test-container

  # ============================================================================
  # CI Summary
  # ============================================================================
  ci-success:
    name: CI Complete
    needs:
      - detect-changes
      - audit
      - lint
      - typecheck
      - test
      - build
      - docker-build
      - start-admin-lint
      - start-admin-typecheck
      - start-admin-test
      - start-admin-build
      - start-admin-docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()

    steps:
      - name: Check Results
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "- Run All: ${{ needs.detect-changes.outputs.run-all }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run Site Docker: ${{ needs.detect-changes.outputs.run-docker }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run Start Admin Docker: ${{ needs.detect-changes.outputs.run-start-admin-docker }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Site — Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "- Audit: ${{ needs.audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Type Check: ${{ needs.typecheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Site — Tests & Build" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Build: ${{ needs.docker-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Start Admin" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.start-admin-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Type Check: ${{ needs.start-admin-typecheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.start-admin-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.start-admin-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Build: ${{ needs.start-admin-docker-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Critical failures check (skip 'skipped' — only fail on actual 'failure')
          FAILED=false
          for RESULT in \
            "${{ needs.lint.result }}" \
            "${{ needs.typecheck.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.start-admin-lint.result }}" \
            "${{ needs.start-admin-typecheck.result }}" \
            "${{ needs.start-admin-test.result }}" \
            "${{ needs.start-admin-build.result }}"; do
            if [[ "$RESULT" == "failure" ]]; then
              FAILED=true
              break
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ CI failed due to critical job failures" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All critical CI checks passed" >> $GITHUB_STEP_SUMMARY

