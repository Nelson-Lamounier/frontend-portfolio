# Deploy Next.js Application to Production
# Manual trigger only with confirmation gate
# Full pipeline: prepare → build → sync-assets → migrate-articles → deploy → summary

name: Deploy NextJS to Production

on:
  push:
    branches:
      - develop
    paths:
      - 'src/**'
      - 'public/**'
      - 'Dockerfile'
      - 'package.json'
      - 'yarn.lock'
      - 'next.config.*'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      confirm-deployment:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  # ===========================================================================
  # Pre-flight Checks
  # ===========================================================================
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      api-url: ${{ steps.ssm.outputs.api-url }}

    steps:
      - name: Validate Confirmation
        id: check
        run: |
          # Skip confirmation gate for push-triggered runs (testing)
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
            echo "✓ Push trigger — skipping confirmation gate (testing)"
            exit 0
          fi

          if [ "${{ inputs.confirm-deployment }}" != "DEPLOY" ]; then
            echo "ERROR: Deployment not confirmed. Type 'DEPLOY' to proceed."
            exit 1
          fi
          echo "proceed=true" >> $GITHUB_OUTPUT
          echo "✓ Deployment confirmed"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Get API URL from SSM
        id: ssm
        run: |
          API_URL=$(aws ssm get-parameter \
            --name "/nextjs/production/api-gateway-url" \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || echo "")

          if [ -n "$API_URL" ] && [ "$API_URL" != "None" ]; then
            echo "api-url=$API_URL" >> $GITHUB_OUTPUT
            echo "✓ API URL retrieved from SSM"
          else
            echo "⚠️ API URL not found in SSM, build will use file fallback"
            echo "api-url=" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Build and Push Docker Image
  # ===========================================================================
  build:
    name: Build Image
    needs: [preflight]
    if: needs.preflight.outputs.proceed == 'true'
    uses: ./.github/workflows/_build-push-image.yml
    with:
      environment: production
      ssm-ecr-param: '/shared/ecr/production/repository-uri'
      api-url: ${{ needs.preflight.outputs.api-url }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Sync Static Assets to S3 & Invalidate CloudFront
  # ===========================================================================
  sync-assets:
    name: Sync Assets
    needs: [build]
    uses: ./.github/workflows/_sync-assets.yml
    with:
      environment: production
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Migrate Articles to DynamoDB
  # ===========================================================================
  migrate-articles:
    name: Migrate Articles
    needs: [build]
    uses: ./.github/workflows/_migrate-articles.yml
    with:
      environment: production
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Deploy to ECS
  # ===========================================================================
  deploy:
    name: Deploy to Production
    needs: [build, sync-assets, migrate-articles]
    uses: ./.github/workflows/_deploy-ecs-service.yml
    with:
      environment: production
      wait-for-stability: true
      stability-timeout: 15
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Post-Deployment Summary
  # ===========================================================================
  summary:
    name: Summary
    needs: [preflight, build, sync-assets, migrate-articles, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Deployment Result
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          echo "## 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $TIMESTAMP" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-flight | ${{ needs.preflight.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sync Assets | ${{ needs.sync-assets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrate Articles | ${{ needs.migrate-articles.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "## ✅ Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ needs.deploy.outputs.service-url }}" ]; then
              echo "**Production URL**: ${{ needs.deploy.outputs.service-url }}" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "${{ needs.deploy.outputs.deployment-status }}" == "rolled-back" ]; then
            echo "## ⚠️ Production Deployment Rolled Back" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The deployment was automatically rolled back due to health check failure." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Production Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Review the deployment logs for details." >> $GITHUB_STEP_SUMMARY
          fi
