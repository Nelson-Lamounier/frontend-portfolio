# Deploy Next.js Application to Development
# Triggers on push to develop branch
# Builds Docker image, pushes to ECR as :latest, then forces ECS redeployment
# Uses mutable :latest tag strategy - no new task definition revisions
# Test last infra deployment

name: Deploy NextJS to Dev

on:
  push:
    branches:
      - develop
    paths:
      - 'src/**'
      - 'public/**'
      - 'Dockerfile'
      - 'package.json'
      - 'yarn.lock'
      - 'next.config.*'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  # ===========================================================================
  # Prepare: Fetch configuration from SSM
  # ===========================================================================
  prepare:
    name: Prepare Config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development
    outputs:
      api-url: ${{ steps.ssm.outputs.api-url }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Get API URL from SSM
        id: ssm
        run: |
          API_URL=$(aws ssm get-parameter \
            --name "/nextjs/development/api-gateway-url" \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || echo "")

          if [ -n "$API_URL" ] && [ "$API_URL" != "None" ]; then
            echo "api-url=$API_URL" >> $GITHUB_OUTPUT
            echo "✓ API URL retrieved from SSM"
          else
            echo "⚠️ API URL not found in SSM, build will use file fallback"
            echo "api-url=" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Build and Push Docker Image as :latest
  # ===========================================================================
  build:
    name: Build Image
    needs: [prepare]
    uses: ./.github/workflows/_build-push-image.yml
    with:
      environment: development
      ssm-ecr-param: '/shared/ecr/development/repository-uri'
      push-to-dockerhub: true
      api-url: ${{ needs.prepare.outputs.api-url }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ===========================================================================
  # Sync Static Assets to S3 & Invalidate CloudFront
  # ===========================================================================
  sync-assets:
    name: Sync Assets
    needs: [build]
    uses: ./.github/workflows/_sync-assets.yml
    with:
      environment: development
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Migrate Articles to DynamoDB
  # ===========================================================================
  migrate-articles:
    name: Migrate Articles
    needs: [build]
    uses: ./.github/workflows/_migrate-articles.yml
    with:
      environment: development
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Deploy to ECS (force redeployment to pull updated :latest)
  # ===========================================================================
  deploy:
    name: Deploy to ECS
    needs: [build, sync-assets, migrate-articles]
    uses: ./.github/workflows/_deploy-ecs-service.yml
    with:
      environment: development
      wait-for-stability: true
      stability-timeout: 10
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Deployment Summary
  # ===========================================================================
  summary:
    name: Summary
    needs: [prepare, build, sync-assets, migrate-articles, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Deployment Result
        run: |
          echo "## Development Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prepare Config | ${{ needs.prepare.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sync Assets | ${{ needs.sync-assets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrate Articles | ${{ needs.migrate-articles.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment completed successfully" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ needs.deploy.outputs.service-url }}" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**URL**: ${{ needs.deploy.outputs.service-url }}" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Deployment failed" >> $GITHUB_STEP_SUMMARY
          fi
