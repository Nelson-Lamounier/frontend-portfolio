# .github/workflows/_sync-assets.yml
# Reusable workflow for syncing static assets to S3 and invalidating CloudFront
# Calls existing scripts from the repo for consistency between CI and manual runs

name: Sync Static Assets (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (development, staging, production)'
        required: true
        type: string
    secrets:
      AWS_OIDC_ROLE:
        required: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  sync:
    name: Sync Assets & Invalidate Cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.environment }}
          path: /tmp

      - name: Extract Static Assets from Docker Image
        run: |
          echo "Loading Docker image..."
          docker load -i /tmp/docker-image.tar

          echo "Extracting static assets..."
          TEMP_CONTAINER=$(docker create frontend:latest)

          mkdir -p .next
          if ! docker cp "$TEMP_CONTAINER:/app/.next/static" ".next/"; then
            echo "❌ Failed to extract static assets"
            docker rm "$TEMP_CONTAINER" > /dev/null 2>&1 || true
            exit 1
          fi
          docker rm "$TEMP_CONTAINER" > /dev/null

          ASSET_COUNT=$(find .next/static -type f | wc -l | tr -d ' ')
          echo "✓ Extracted $ASSET_COUNT static assets"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Sync to S3 & Invalidate CloudFront
        run: |
          ENVIRONMENT="${{ inputs.environment }}"
          npx tsx scripts/sync-static-to-s3.ts --env "$ENVIRONMENT" --region "${{ env.AWS_REGION }}"

      - name: Sync Summary
        run: |
          echo "## 🔄 Static Assets Synced" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Assets synced to S3** ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront invalidation created** ✅" >> $GITHUB_STEP_SUMMARY
