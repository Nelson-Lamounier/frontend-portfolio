# Deploy Next.js Application to Development
# Triggers on push to develop branch
# Builds Docker image, pushes to ECR as :latest, then forces ECS redeployment
# Uses mutable :latest tag strategy - no new task definition revisions

name: Deploy NextJS to Dev

on:
  push:
    branches:
      - develop
    paths:
      - 'src/**'
      - 'public/**'
      - 'Dockerfile'
      - 'package.json'
      - 'yarn.lock'
      - 'next.config.*'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # Build and Push Docker Image as :latest
  # ===========================================================================
  build:
    name: Build Image
    uses: ./.github/workflows/_build-push-image.yml
    with:
      environment: development
      ssm-ecr-param: '/shared/ecr/development/repository-uri'
      push-to-dockerhub: true
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ===========================================================================
  # Sync Static Assets to S3 & Invalidate CloudFront
  # ===========================================================================
  sync-assets:
    name: Sync Assets
    needs: [build]
    uses: ./.github/workflows/_sync-assets.yml
    with:
      environment: development
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Deploy to ECS (force redeployment to pull updated :latest)
  # ===========================================================================
  deploy:
    name: Deploy to ECS
    needs: [build, sync-assets]
    uses: ./.github/workflows/_deploy-ecs-service.yml
    with:
      environment: development
      ssm-cluster-param: '/nextjs/development/ecs/cluster-name'
      ssm-service-param: '/nextjs/development/ecs/service-name'
      wait-for-stability: true
      stability-timeout: 10
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Deployment Summary
  # ===========================================================================
  summary:
    name: Summary
    needs: [build, sync-assets, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Deployment Result
        run: |
          echo "## Development Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sync Assets | ${{ needs.sync-assets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment completed successfully" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ needs.deploy.outputs.service-url }}" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**URL**: ${{ needs.deploy.outputs.service-url }}" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Deployment failed" >> $GITHUB_STEP_SUMMARY
          fi
