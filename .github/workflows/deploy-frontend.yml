# =============================================================================
# Orchestrator: Deploy Site Frontend (Development)
# =============================================================================
#
# CD pipeline for the Next.js site application.
#
# Trigger methods:
#   1. Manual: workflow_dispatch from GitHub UI
#   2. Cross-repo: repository_dispatch from infrastructure pipelines
#   3. On push to main: automatic deployment
#
# Deployment path:
#   build-site -> push-site -> sync-assets
#                         -> deploy-site -> summary
#   (ArgoCD Image Updater + Argo Rollouts auto-promote the blue-green rollout;
#    no manual promote step — same as the tucaken-app deploy.)
# =============================================================================

name: "Deploy Site Frontend (Dev)"

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      frontend-ref:
        description: "Git ref to deploy (branch, tag, SHA)"
        required: false
        default: "main"
        type: string
  # Cross-repo trigger from infrastructure pipelines
  repository_dispatch:
    types: [deploy-nextjs-dev]

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: development
  AWS_REGION: "eu-west-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Composite tag prevents ECR overwrites on pipeline retries
  IMAGE_TAG: "${{ github.sha }}-r${{ github.run_attempt }}"

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Resolve the git ref to deploy
  # ===========================================================================
  resolve-targets:
    name: Resolve Deploy Target
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      deploy-site: ${{ steps.targets.outputs.deploy-site }}
      frontend-ref: ${{ steps.targets.outputs.frontend-ref }}

    steps:
      - name: Compute targets
        id: targets
        run: |
          echo "deploy-site=true" >> $GITHUB_OUTPUT

          # For push events, use the pushed SHA; otherwise use the input/payload ref
          if [[ "${{ github.event_name }}" == "push" ]]; then
            REF="${{ github.sha }}"
          else
            REF="${{ github.event.inputs.frontend-ref || github.event.client_payload.ref || 'main' }}"
          fi
          echo "frontend-ref=$REF" >> $GITHUB_OUTPUT
          echo "Deploy target: site, ref=$REF"

  # ===========================================================================
  # ── SITE (Next.js) ──────────────────────────────────────────────────────────
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Build site Docker image — checks out this repo (no cross-repo PAT needed)
  # ---------------------------------------------------------------------------
  build-site:
    name: "[Site] Build Docker Image"
    needs: [resolve-targets]
    if: needs.resolve-targets.outputs.deploy-site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-targets.outputs.frontend-ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image (site)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          tags: site:${{ env.IMAGE_TAG }}
          build-args: |
            APP_NAME=site
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=site
          cache-to: type=gha,mode=max,scope=site
          provenance: false
          outputs: type=docker,dest=/tmp/site-image.tar

      - name: Extract Static Assets (for S3 Sync)
        # frontend-portfolio monorepo layout:
        #   COPY --from=builder /app/apps/site/.next/static ./apps/site/.next/static
        # → inside container: /app/apps/site/.next/static
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          docker load -i /tmp/site-image.tar
          TEMP=$(docker create "site:${IMAGE_TAG}")

          mkdir -p /tmp/next-static

          if docker cp "${TEMP}:/app/apps/site/.next/static" "/tmp/next-static/" 2>/dev/null; then
            echo "[PASS] Extracted from /app/apps/site/.next/static (monorepo layout)"
          elif docker cp "${TEMP}:/app/apps/site/.next/standalone/.next/static" "/tmp/next-static/" 2>/dev/null; then
            echo "[PASS] Extracted from /app/apps/site/.next/standalone/.next/static"
          else
            echo "::error::Could not find .next/static at any known path in the container."
            echo ""
            echo "--- All .next paths in the image ---"
            docker export "${TEMP}" | tar t 2>/dev/null | grep -E "\.next" | head -60 || true
            docker rm "${TEMP}" > /dev/null 2>&1 || true
            exit 1
          fi

          docker rm "${TEMP}" > /dev/null 2>&1 || true

          ASSET_COUNT=$(find /tmp/next-static -type f | wc -l | tr -d ' ')
          echo "[PASS] $ASSET_COUNT static assets ready for S3 sync"

      - name: Cache Static Assets
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/next-static
          key: site-static-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Cache Site Image
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/site-image.tar
          key: site-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build Summary
        run: |
          IMAGE_SIZE=$(du -sh /tmp/site-image.tar | cut -f1)
          ASSET_COUNT=$(find /tmp/next-static -type f | wc -l | tr -d ' ')
          echo "## [Site] Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Static assets**: $ASSET_COUNT files" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref**: ${{ needs.resolve-targets.outputs.frontend-ref }}" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Push site image to ECR
  # ---------------------------------------------------------------------------
  push-site:
    name: "[Site] Push to ECR"
    needs: [resolve-targets, build-site]
    if: needs.resolve-targets.outputs.deploy-site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore Site Image from Cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/site-image.tar
          key: site-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Load Docker Image
        run: |
          docker load -i /tmp/site-image.tar
          echo "[PASS] Site image loaded"

      - name: Resolve ECR URL (site)
        id: resolve-ecr
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "::error::Site ECR URL not found at /shared/ecr/${{ env.ENVIRONMENT }}/repository-uri"
            exit 1
          fi

          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Push Site Image to ECR
        run: |
          ECR_URL="${{ steps.resolve-ecr.outputs.ecr-url }}"
          TAG="${{ env.IMAGE_TAG }}"
          REGISTRY="${ECR_URL%%/*}"

          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "$REGISTRY"

          docker tag "site:${TAG}" "${ECR_URL}:${TAG}"
          docker push "${ECR_URL}:${TAG}"

          echo "[PASS] Site image pushed: ${ECR_URL}:${TAG}"

      - name: Push Summary
        run: |
          echo "## [Site] ECR Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }} ✅" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Sync site static assets to S3
  # ---------------------------------------------------------------------------
  sync-assets:
    name: "[Site] Sync Static Assets"
    needs: [resolve-targets, push-site]
    if: needs.resolve-targets.outputs.deploy-site == 'true'
    uses: ./.github/workflows/_sync-assets.yml
    with:
      environment: development
      static-cache-path: /tmp/next-static
      static-cache-key-prefix: site-static
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ---------------------------------------------------------------------------
  # Write SSM so ArgoCD Image Updater picks up the new site image
  # ---------------------------------------------------------------------------
  deploy-site:
    name: "[Site] Update SSM → ArgoCD"
    needs: [resolve-targets, push-site]
    if: needs.resolve-targets.outputs.deploy-site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Image URI
        id: resolve
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          IMAGE_URI="${ECR_URL}:${{ env.IMAGE_TAG }}"
          echo "::add-mask::$ECR_URL"
          echo "::add-mask::$IMAGE_URI"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Write Image URI to SSM
        run: |
          aws ssm put-parameter \
            --name "/nextjs/${{ env.ENVIRONMENT }}/image-uri" \
            --value "${{ steps.resolve.outputs.image-uri }}" \
            --type String \
            --overwrite

          echo "[PASS] Site image URI written to SSM — ArgoCD Image Updater will promote"

      - name: Deploy Summary
        run: |
          echo "## [Site] Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **SSM**: \`/nextjs/${{ env.ENVIRONMENT }}/image-uri\` ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD Image Updater will detect the new tag and trigger a BlueGreen promotion." >> $GITHUB_STEP_SUMMARY


  # ===========================================================================
  # Summary — waits for the site deployment path
  # ===========================================================================
  summary:
    name: Deployment Summary
    needs:
      - resolve-targets
      - build-site
      - push-site
      - sync-assets
      - deploy-site
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary
        run: |
          echo "## Site Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.resolve-targets.outputs.deploy-site }}" == "true" ]]; then
            echo "| Site (Next.js)   | Build Image     | ${{ needs.build-site.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Site (Next.js)   | Push to ECR     | ${{ needs.push-site.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Site (Next.js)   | Sync Assets     | ${{ needs.sync-assets.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Site (Next.js)   | Deploy to K8s   | ${{ needs.deploy-site.result }} |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=false
          for RESULT in \
            "${{ needs.build-site.result }}" \
            "${{ needs.push-site.result }}" \
            "${{ needs.sync-assets.result }}" \
            "${{ needs.deploy-site.result }}"; do
            [[ "$RESULT" == "failure" || "$RESULT" == "cancelled" ]] && { FAILED=true; break; }
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "**Result: FAILED** — check individual job logs above" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "**Result: SUCCESS**" >> $GITHUB_STEP_SUMMARY
