# .github/workflows/_deploy-ecs-service.yml
# Reusable workflow for deploying to ECS via service update
# Uses mutable :latest tag strategy - no new task definition revisions
# Simply forces a new deployment so ECS pulls the updated :latest image

name: Deploy to ECS Service (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (development, staging, production)'
        required: true
        type: string
      ssm-cluster-param:
        description: 'SSM parameter name for ECS cluster name'
        required: true
        type: string
      ssm-service-param:
        description: 'SSM parameter name for ECS service name'
        required: true
        type: string
      wait-for-stability:
        description: 'Wait for ECS service to stabilize'
        required: false
        type: boolean
        default: true
      stability-timeout:
        description: 'Timeout in minutes for service stability'
        required: false
        type: number
        default: 10
    secrets:
      AWS_OIDC_ROLE:
        required: true
    outputs:
      deployment-status:
        description: 'Deployment status (success/failure)'
        value: ${{ jobs.deploy.outputs.status }}
      service-url:
        description: 'Service URL (if available)'
        value: ${{ jobs.deploy.outputs.service-url }}

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    outputs:
      status: ${{ steps.final-status.outputs.status }}
      service-url: ${{ steps.health-check.outputs.service-url }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Get ECS Configuration from SSM
        id: ecs-config
        run: |
          echo "Retrieving ECS configuration from SSM..."

          CLUSTER_NAME=$(aws ssm get-parameter \
            --name "${{ inputs.ssm-cluster-param }}" \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || echo "")

          SERVICE_NAME=$(aws ssm get-parameter \
            --name "${{ inputs.ssm-service-param }}" \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || echo "")

          # Validate required parameters
          if [ -z "$CLUSTER_NAME" ] || [ "$CLUSTER_NAME" = "None" ]; then
            echo "ERROR: ECS cluster name not found in SSM"
            exit 1
          fi

          if [ -z "$SERVICE_NAME" ] || [ "$SERVICE_NAME" = "None" ]; then
            echo "ERROR: ECS service name not found in SSM"
            exit 1
          fi

          echo "cluster-name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
          echo "service-name=$SERVICE_NAME" >> $GITHUB_OUTPUT

          echo "✓ ECS Cluster: $CLUSTER_NAME"
          echo "✓ ECS Service: $SERVICE_NAME"

      - name: Force New Deployment
        id: update-service
        run: |
          echo "Forcing new deployment (ECS will pull :latest image)..."

          aws ecs update-service \
            --cluster "${{ steps.ecs-config.outputs.cluster-name }}" \
            --service "${{ steps.ecs-config.outputs.service-name }}" \
            --force-new-deployment \
            --query 'service.{status:status,desiredCount:desiredCount,runningCount:runningCount}' \
            --output table

          echo "✓ Deployment initiated"

      - name: Wait for Service Stability
        id: wait-stability
        if: inputs.wait-for-stability
        run: |
          echo "Waiting for service to stabilize (timeout: ${{ inputs.stability-timeout }} minutes)..."

          if aws ecs wait services-stable \
            --cluster "${{ steps.ecs-config.outputs.cluster-name }}" \
            --services "${{ steps.ecs-config.outputs.service-name }}"; then
            echo "✓ Service is stable"
            echo "stable=true" >> $GITHUB_OUTPUT
          else
            echo "⚠ Service did not stabilize within timeout"
            echo "stable=false" >> $GITHUB_OUTPUT
          fi

      - name: Health Check
        id: health-check
        run: |
          echo "Running health check..."

          # Get the load balancer URL from the service
          TG_ARN=$(aws ecs describe-services \
            --cluster "${{ steps.ecs-config.outputs.cluster-name }}" \
            --services "${{ steps.ecs-config.outputs.service-name }}" \
            --query 'services[0].loadBalancers[0].targetGroupArn' \
            --output text 2>/dev/null || echo "")

          if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
            ALB_ARN=$(aws elbv2 describe-target-groups \
              --target-group-arns "$TG_ARN" \
              --query 'TargetGroups[0].LoadBalancerArns[0]' \
              --output text 2>/dev/null || echo "")

            if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
              SERVICE_URL=$(aws elbv2 describe-load-balancers \
                --load-balancer-arns "$ALB_ARN" \
                --query 'LoadBalancers[0].DNSName' \
                --output text)

              echo "service-url=http://$SERVICE_URL" >> $GITHUB_OUTPUT

              # Wait for ALB health check
              sleep 30

              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 30 "http://$SERVICE_URL/api/health" 2>/dev/null || echo "000")

              if [ "$HTTP_CODE" = "200" ]; then
                echo "✓ Health check passed (HTTP $HTTP_CODE)"
                echo "healthy=true" >> $GITHUB_OUTPUT
              else
                echo "✗ Health check failed (HTTP $HTTP_CODE)"
                echo "healthy=false" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "No load balancer configured, skipping HTTP health check"
            echo "healthy=skip" >> $GITHUB_OUTPUT
          fi

      - name: Final Status
        id: final-status
        if: always()
        run: |
          STABLE="${{ steps.wait-stability.outputs.stable }}"
          HEALTHY="${{ steps.health-check.outputs.healthy }}"

          if [ "$STABLE" = "false" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Service did not stabilize after force-new-deployment." >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "$HEALTHY" = "false" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "## ❌ Health Check Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Service is running but health check did not pass." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Cluster**: ${{ steps.ecs-config.outputs.cluster-name }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Service**: ${{ steps.ecs-config.outputs.service-name }}" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ steps.health-check.outputs.service-url }}" ]; then
              echo "- **URL**: ${{ steps.health-check.outputs.service-url }}" >> $GITHUB_STEP_SUMMARY
            fi
          fi
