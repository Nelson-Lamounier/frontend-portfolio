# .github/workflows/_build-push-image.yml
# Reusable workflow for building Next.js Docker image and pushing to ECR
# Retrieves ECR repository URL from SSM Parameter Store

name: Build and Push Docker Image (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (development, staging, production)'
        required: true
        type: string
      image-tag:
        description: 'Docker image tag (default: commit SHA)'
        required: false
        type: string
        default: ''
      ssm-ecr-param:
        description: 'SSM parameter name for ECR repository URL'
        required: false
        type: string
        default: '/nextjs/dev/ecr/repository-url'
    secrets:
      AWS_OIDC_ROLE:
        required: true
    outputs:
      image-uri:
        description: 'Full Docker image URI (including tag)'
        value: ${{ jobs.build-push.outputs.image-uri }}
      image-digest:
        description: 'Docker image digest'
        value: ${{ jobs.build-push.outputs.image-digest }}
      image-tag:
        description: 'Docker image tag used'
        value: ${{ jobs.build-push.outputs.image-tag }}

env:
  NODE_VERSION: '22'
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ inputs.environment }}
    outputs:
      image-uri: ${{ steps.build-push.outputs.image-uri }}
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Get ECR Repository URL from SSM
        id: ecr-url
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "${{ inputs.ssm-ecr-param }}" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "ERROR: ECR repository URL not found in SSM parameter ${{ inputs.ssm-ecr-param }}"
            exit 1
          fi

          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT
          echo "✓ Retrieved ECR repository URL from SSM"

      - name: Determine Image Tag
        id: image-tag
        run: |
          if [ -n "${{ inputs.image-tag }}" ]; then
            TAG="${{ inputs.image-tag }}"
          else
            # Use commit SHA with environment prefix
            TAG="${{ inputs.environment }}-${GITHUB_SHA::8}"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using image tag: $TAG"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-url.outputs.ecr-url }}
          tags: |
            type=raw,value=${{ steps.image-tag.outputs.tag }}
            type=raw,value=${{ inputs.environment }}-latest
            type=sha,prefix=${{ inputs.environment }}-

      - name: Build and Push Docker Image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1

      - name: Output Image URI
        run: |
          IMAGE_URI="${{ steps.ecr-url.outputs.ecr-url }}:${{ steps.image-tag.outputs.tag }}"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ steps.ecr-url.outputs.ecr-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ steps.image-tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: ${{ steps.build-push.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Image pushed successfully" >> $GITHUB_STEP_SUMMARY
