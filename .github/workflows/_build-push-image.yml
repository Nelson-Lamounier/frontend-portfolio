# .github/workflows/_build-push-image.yml
# Reusable workflow for building Next.js Docker image and pushing to ECR
# Decoupled into two jobs: build (no AWS needed) and push (calls scripts/push-to-ecr.sh)
# Build failures are clearly visible at the pipeline level

name: Build and Push Docker Image (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (development, staging, production)'
        required: true
        type: string
      image-tag:
        description: 'Docker image tag (default: latest)'
        required: false
        type: string
        default: 'latest'
      ssm-ecr-param:
        description: 'SSM parameter name for ECR repository URL'
        required: true
        type: string
      push-to-dockerhub:
        description: 'Also push image to Docker Hub'
        required: false
        type: boolean
        default: false
      api-url:
        description: 'Articles API URL (NEXT_PUBLIC_API_URL) to inject at build time'
        required: false
        type: string
        default: ''
    secrets:
      AWS_OIDC_ROLE:
        required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
    outputs:
      image-uri:
        description: 'Full Docker image URI (including tag)'
        value: ${{ jobs.push.outputs.image-uri }}

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  # ===========================================================================
  # Job 1: Build Docker Image (no AWS credentials needed)
  # ===========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: frontend:${{ inputs.image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1
            NEXT_PUBLIC_API_URL=${{ inputs.api-url }}
          outputs: type=docker,dest=/tmp/docker-image.tar

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.environment }}
          path: /tmp/docker-image.tar
          retention-days: 1
          if-no-files-found: error

      - name: Build Summary
        run: |
          IMAGE_SIZE=$(du -sh /tmp/docker-image.tar | cut -f1)
          echo "## 🐳 Docker Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ inputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 2: Push to ECR and Docker Hub (calls scripts/push-to-ecr.ts)
  # ===========================================================================
  push:
    name: Push to Registries
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    outputs:
      image-uri: ${{ steps.push-image.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Get ECR Repository URL from SSM
        id: ecr-url
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "${{ inputs.ssm-ecr-param }}" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "ERROR: ECR repository URL not found in SSM parameter ${{ inputs.ssm-ecr-param }}"
            exit 1
          fi

          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT
          echo "✓ Retrieved ECR repository URL from SSM"

      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.environment }}
          path: /tmp

      - name: Load Docker Image
        run: |
          echo "Loading Docker image from artifact..."
          docker load -i /tmp/docker-image.tar
          echo "✓ Image loaded"

      - name: Push to ECR
        id: push-image
        run: |
          npx tsx scripts/push-to-ecr.ts \
            --env "${{ inputs.environment }}" \
            --tag "${{ inputs.image-tag }}" \
            --ecr-url "${{ steps.ecr-url.outputs.ecr-url }}" \
            --image-name "frontend:${{ inputs.image-tag }}" \
            --skip-build \
            --skip-sync \
            --region "${{ env.AWS_REGION }}"

          echo "image-uri=${{ steps.ecr-url.outputs.ecr-url }}:${{ inputs.image-tag }}" >> $GITHUB_OUTPUT

      - name: Push to Docker Hub
        if: inputs.push-to-dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push to Docker Hub
        if: inputs.push-to-dockerhub
        run: |
          TAG="${{ inputs.image-tag }}"
          DOCKERHUB_REPO="lamounierdev/nextjs-application"

          docker tag "frontend:${TAG}" "${DOCKERHUB_REPO}:${TAG}"
          docker tag "frontend:${TAG}" "${DOCKERHUB_REPO}:latest"

          docker push "${DOCKERHUB_REPO}:${TAG}"
          docker push "${DOCKERHUB_REPO}:latest"

          echo "✓ Image pushed to Docker Hub"

      - name: Push Summary
        run: |
          echo "## 📦 Image Pushed to Registries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ECR" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ steps.ecr-url.outputs.ecr-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ inputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URI**: ${{ steps.push-image.outputs.image-uri }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: lamounierdev/nextjs-application" >> $GITHUB_STEP_SUMMARY
          echo "- **Pull**: \`docker pull lamounierdev/nextjs-application:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ready for deployment" >> $GITHUB_STEP_SUMMARY
